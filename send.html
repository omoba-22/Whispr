</head>
<body>

<nav class="bottom-nav" id="bottom-nav">
  <a class="bottom-nav-item" href="index.html"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>Feed</a>
  <a class="bottom-nav-item" href="index.html#trending"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>Trending</a>
  <a class="bottom-nav-item fab-btn active" href="send.html"><div class="fab-inner"><svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></div>Send</a>
  <a class="bottom-nav-item" href="create.html"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>My Link</a>

<div class="page-wrap">
  <div class="send-hero">
    <div id="send-recipient-tag" class="recipient-tag" style="display:none"></div>
    <h2>Drop a message</h2>
    <p id="send-subtitle">It's anonymous. They'll never know it's you.</p>
  </div>

  <div id="send-form-area">
    <div class="form-card" id="recipient-section" style="display:none;margin-bottom:0.8rem;">
      <label class="form-label">Send to (username)</label>
      <input type="text" id="to-username" placeholder="e.g. josh" />
    </div>
    <div class="form-card">
      <div class="form-group">
        <label class="form-label">Your message</label>
        <textarea id="msg-text" maxlength="300" placeholder="type something real..." oninput="document.getElementById('char-count').textContent=this.value.length"></textarea>
        <div class="char-count"><span id="char-count">0</span>/300</div>
      </div>
      <div class="form-group">
        <label class="form-label">Pick a vibe</label>
        <div class="mood-selector">
          <div class="mood-option" data-mood="😤 Vent"        onclick="selectMood(this)">😤 Vent</div>
          <div class="mood-option" data-mood="💀 No Cap"      onclick="selectMood(this)">💀 No Cap</div>
          <div class="mood-option" data-mood="🥺 Feels"       onclick="selectMood(this)">🥺 Feels</div>
          <div class="mood-option" data-mood="🔥 Hot Take"    onclick="selectMood(this)">🔥 Hot Take</div>
          <div class="mood-option" data-mood="👀 Tea"         onclick="selectMood(this)">👀 Tea</div>
        </div>
      </div>
      <div class="form-group">
        <div class="public-toggle" onclick="togglePublic()">
          <div class="toggle-switch on" id="public-toggle-switch"></div>
          <div class="toggle-label"><strong>Show on public feed</strong>Still 100% anonymous</div>
        </div>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">Send anonymously ✦</button>
    </div>
  </div>

  <div id="send-success" style="display:none">
    <div class="success-msg">
      <div class="big-emoji">👻</div>
      <h3>Message sent!</h3>
      <p>They have no idea who you are. 👀</p><br>
      <button class="btn btn-primary btn-lg" onclick="resetSend()">Send another</button>
    </div>
  </div>
</div>

<script src="./js/send.js"></script>
</body>
</html>
